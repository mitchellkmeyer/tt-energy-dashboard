<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strip — TT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Roboto+Slab:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    :root {
      --dark-brown: #262423;
      --ivory:      #FEFCFA;
      --live-accent: #D1A45A;  /* warm gold — live element (contrast vs. green/white) */
      --up:         #5BBF6A;   /* gain */
      --down:       #E0685B;   /* loss */
      --panel-bg:   rgba(255,255,255,0.035);
      --muted:      rgba(254,252,250,0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--dark-brown);
      color: var(--ivory);
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 18px 24px 14px;
      gap: 12px;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 16px;
      padding: 11px 0;
      order: 3;
    }

    .logo-wrap svg {
      height: 34px;
      width: auto;
      display: block;
    }

    .header-center { display: none; }

    .header-center h1 {
      font-family: 'Roboto Slab', serif;
      font-weight: 600;
      font-size: 2.52rem;
      letter-spacing: 0.06em;
      color: var(--ivory);
      text-transform: uppercase;
    }

    .header-center .subtitle {
      font-size: 1.53rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .header-meta {
      text-align: right;
      font-size: 1.22rem;
      color: var(--muted);
      line-height: 1.6;
      min-width: 130px;
    }

    /* ── Charts ──────────────────────────────────────────────────────────── */
    .charts {
      display: flex;
      flex: 1;
      gap: 16px;
      min-height: 0;
    }

    .chart-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--panel-bg);
      border-radius: 10px;
      padding: 16px 20px 12px;
      min-height: 0;
    }

    .chart-title {
      font-family: 'Roboto Slab', serif;
      font-size: 2.34rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--ivory);
      flex-shrink: 0;
      margin-bottom: 8px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }

    .chart-title-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .chart-unit {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 1.62rem;
      color: var(--muted);
    }

    /* ── Live price ticker (amber accent) ────────────────────────────────────── */
    .ticker-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }

    .ticker {
      display: inline-flex;
      align-items: center;
      gap: 13px;
      border: 2px solid var(--live-accent);
      border-radius: 9px;
      padding: 4px 13px;
      font-family: 'Roboto', sans-serif;
      line-height: 1.1;
    }

    /* Intraday sparkline/area thumbnail, left of the price inside the box */
    .ticker-spark {
      width: 70px;
      height: 36px;
      position: relative;
      flex-shrink: 0;
    }
    .ticker-spark canvas { display: block; }

    .ticker-readout {
      display: inline-flex;
      align-items: baseline;
      gap: 11px;
    }

    .ticker-price {
      font-size: 1.72rem;
      font-weight: 500;
      color: var(--ivory);
      letter-spacing: 0.01em;
    }

    .ticker-change {
      font-size: 1.18rem;
      font-weight: 500;
      white-space: nowrap;
    }
    .ticker-change.up   { color: var(--up); }
    .ticker-change.down { color: var(--down); }
    .ticker-change.flat { color: var(--muted); }

    .ticker-asof {
      font-size: 0.92rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.02em;
      white-space: nowrap;
      padding-right: 4px;
    }

    .ticker.empty { opacity: 0; }   /* hide box until first quote loads */

    .canvas-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    /* ── Legend ──────────────────────────────────────────────────────────── */
    .legend {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 36px;
      flex-shrink: 0;
      padding: 4px 0 2px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 1.33rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .legend-swatch {
      width: 30px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Data source tag ─────────────────────────────────────────────────── */
    #data-sources {
      position: fixed;
      bottom: 8px;
      right: 14px;
      font-size: 0.7rem;
      color: rgba(254,252,250,0.22);
      letter-spacing: 0.04em;
      pointer-events: none;
    }

    /* ── Top spacer bar ──────────────────────────────────────────────────── */
    .top-bar {
      flex-shrink: 0;
      order: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 4px;
    }

    .clock {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .clock-date {
      display: flex;
      flex-direction: column;
      align-items: flex-end;     /* right-align the two lines against the bar */
      line-height: 1.25;
      font-size: 1.1rem;
    }

    .clock-divider {
      width: 1px;
      align-self: stretch;       /* span the full height of the clock block */
      background: var(--muted);
      opacity: 0.55;
    }

    .clock-time {
      font-size: 2.2rem;
      font-weight: 400;
    }

    /* ── Status overlay ──────────────────────────────────────────────────── */
    #status {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--dark-brown);
      font-family: 'Roboto Slab', serif;
      font-size: 2.07rem;
      color: var(--muted);
      z-index: 100;
      text-align: center;
      padding: 40px;
    }

    /* ── Mobile / narrow screens ─────────────────────────────────────────────── */
    /* Only applies below 820px — the TV's wide landscape layout is untouched. */
    @media (max-width: 820px) {
      html, body { height: auto; }
      html { overflow-x: hidden; overflow-y: auto; }   /* the page scroller */
      body {
        overflow: visible;
        padding: 10px 14px 22px;
        gap: 14px;
      }

      /* Stack the charts vertically; each gets its own height and the page scrolls */
      .charts {
        flex-direction: column;
        flex: initial;
        gap: 18px;
      }
      .chart-panel {
        flex: initial;
        padding: 12px 14px 10px;
      }
      .canvas-wrap {
        flex: initial;
        height: 56vh;
        min-height: 300px;
      }

      /* Title row: let the price ticker wrap under the name if it's tight */
      .chart-title { flex-wrap: wrap; font-size: 1.5rem; gap: 6px 12px; }
      .chart-unit  { font-size: 1.05rem; }
      .ticker      { padding: 3px 10px; border-radius: 7px; gap: 9px; }
      .ticker-spark  { width: 50px; height: 28px; }
      .ticker-price  { font-size: 1.3rem; }
      .ticker-change { font-size: 0.95rem; }
      .ticker-asof   { font-size: 0.8rem; }

      /* Top-bar clock */
      .top-bar    { height: auto; padding: 2px 2px 0; }
      .clock      { gap: 10px; }
      .clock-date { font-size: 0.92rem; }
      .clock-time { font-size: 1.55rem; }

      /* Legend wraps onto multiple rows */
      .legend      { flex-wrap: wrap; gap: 9px 18px; padding: 2px 0; }
      .legend-item { font-size: 0.95rem; }

      /* Bottom header (logo + futures-updated) */
      header        { padding: 8px 0; }
      .logo-wrap svg { height: 26px; }
      .header-meta  { font-size: 1rem; min-width: 0; line-height: 1.4; }

      #status        { font-size: 1.4rem; padding: 30px; }
      #data-sources  { font-size: 0.6rem; bottom: 4px; right: 8px; }
    }
  </style>
</head>

<script>
// ── Date setup ────────────────────────────────────────────────────────────────
const TODAY = new Date();
TODAY.setHours(0, 0, 0, 0);

const todayFmt = `${TODAY.getMonth() + 1}/${TODAY.getDate()}/${TODAY.getFullYear()}`;

// The "strip date" is the date the displayed futures curve was actually pulled
// (the "today" snapshot in energy_data.json), NOT the browser's calendar date.
// On weekends/before the day's 22:00 UTC update it lags real-now — e.g. viewing
// Monday shows Friday's strip. applyStripDate() overrides the labels below once
// the data loads so the "Today (date)" label matches "Futures last updated".
// `todayFmt` (browser now) is only the pre-load fallback.
const titleEl = document.getElementById('page-title');
if (titleEl) titleEl.textContent = `${todayFmt} Strip`;
document.title = `${todayFmt} Strip — TT`;
document.getElementById('legend-today-label').textContent = `Today (${todayFmt})`;

// Format an 'YYYY-MM-DD' snapshot date as 'M/D/YYYY' (manual parse — avoids the
// UTC-midnight day-shift that new Date('YYYY-MM-DD') causes in negative offsets).
function fmtSnapDate(iso) {
  const [y, m, d] = String(iso).split('-').map(Number);
  return `${m}/${d}/${y}`;
}

// Parse a backend timestamp as a Date. Backend stamps are UTC; if one lacks a
// timezone offset, JS would parse it as *local* and show the UTC wall-clock
// (e.g. 6:19 PM instead of 1:19 PM Central). Append 'Z' so naive stamps are UTC.
function parseStamp(s) {
  if (typeof s === 'string' && !/([zZ]|[+-]\d{2}:?\d{2})$/.test(s)) s += 'Z';
  return new Date(s);
}

// "Jun 22, 2026 05:23 PM" — the shared format for the "Futures last updated" stamp.
function fmtStamp(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' ' +
         d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

// The settled "today" snapshot date currently shown (from energy_data.json). The
// live-curve overlay only replaces the today line when its data is at least this
// fresh, so a stale live_curve.json can never regress the chart behind the settle.
let stripSettledDate = null;
let strip1dDate = null;   // snapshot date of the previous-trading-day ("1d") curve

// Parse 'YYYY-MM-DD' to a local-midnight Date (tz-safe — avoids the UTC day-shift
// of new Date('YYYY-MM-DD')).
function dateFromIso(iso) {
  const [y, m, d] = String(iso).split('-').map(Number);
  return new Date(y, m - 1, d);
}

// Re-label everything that names the strip date, using the real snapshot date.
function applyStripDate(iso) {
  if (!iso) return;
  const f = fmtSnapDate(iso);
  CURVE_LABELS.today = `Today (${f})`;
  if (titleEl) titleEl.textContent = `${f} Strip`;
  document.title = `${f} Strip — TT`;
  const lbl = document.getElementById('legend-today-label');
  if (lbl) lbl.textContent = `Today (${f})`;
}

// Label the previous-trading-day curve: "Yesterday" when its snapshot is exactly
// the calendar day before the shown "today" date, otherwise that day's weekday name
// ("Thursday", "Friday", "Monday"…) — so after a weekend/holiday it reads the real
// last trading day. Anchored to todayIso so the pair stays coherent as Today advances.
function applyPrevDayLabel(todayIso, prevIso) {
  if (!prevIso) return;
  const prev = dateFromIso(prevIso);
  let label = prev.toLocaleDateString('en-US', { weekday: 'long' });
  if (todayIso) {
    const before = dateFromIso(todayIso);
    before.setDate(before.getDate() - 1);
    if (before.getFullYear() === prev.getFullYear() &&
        before.getMonth()    === prev.getMonth() &&
        before.getDate()     === prev.getDate()) {
      label = 'Yesterday';
    }
  }
  CURVE_LABELS['1d'] = label;
  const el = document.getElementById('legend-1d-label');
  if (el) el.textContent = label;
}

// ── Ombre green curve styles (all same width, all solid) ──────────────────────
const CURVE_STYLES = {
  'today': { color: '#FEFCFA', width: 2.5, dash: [] },  // ivory (brand)
  '1d':    { color: '#92CC9A', width: 2.5, dash: [] },
  '7d':    { color: '#7EBF87', width: 2.5, dash: [] },
  '1mo':   { color: '#5EA068', width: 2.5, dash: [] },
  '3mo':   { color: '#488252', width: 2.5, dash: [] },
  '1yr':   { color: '#3D6644', width: 2.5, dash: [] },  // darkest
};

const CURVE_LABELS = {
  'today': `Today (${todayFmt})`,
  '1d':    'Yesterday',
  '7d':    '7 Days Ago',
  '1mo':   '1 Month Ago',
  '3mo':   '3 Months Ago',
  '1yr':   '1 Year Ago',
};

// ── "TODAY" vertical separator plugin (main price charts only) ────────────────
const todayLinePlugin = {
  id: 'todayLine',
  afterDraw(chart) {
    if (!chart.canvas.id.endsWith('-chart')) return;   // main price charts only, not sparklines
    const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
    const px = x.getPixelForValue(TODAY);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(px, top);
    ctx.lineTo(px, bottom);
    ctx.strokeStyle = 'rgba(254,252,250,0.18)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(254,252,250,0.35)';
    ctx.font = '500 18px Roboto, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('TODAY', px, top + 16);
    ctx.restore();
  },
};
Chart.register(todayLinePlugin);

// ── Helpers ───────────────────────────────────────────────────────────────────
function getSpotAtDate(spotHistory, dateStr) {
  const target = new Date(dateStr + 'T12:00:00').getTime();
  let best = null, bestDiff = Infinity;
  for (const p of spotHistory) {
    const diff = Math.abs(new Date(p.date + 'T12:00:00').getTime() - target);
    if (diff < bestDiff) { bestDiff = diff; best = p.price; }
  }
  return best;
}

// ── Build datasets ────────────────────────────────────────────────────────────
function buildDatasets(commodity) {
  const datasets = [];
  const spotHistory = commodity.spot_history || [];

  const spotPts = spotHistory.map(d => ({
    x: new Date(d.date + 'T12:00:00'),
    y: d.price,
  }));
  if (spotPts.length) {
    datasets.push({
      label: 'Historical Spot',
      data: spotPts,
      borderColor: 'rgba(254,252,250,0.4)',
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.25,
      spanGaps: true,
      order: 10,
    });
  }

  // Chart.js draws lower dataset indices on top, so list newest first to
  // render Today in front of the older curves
  for (const key of ['today', '1d', '7d', '1mo', '3mo', '1yr']) {
    const snap = commodity.curves?.[key];
    if (!snap?.data?.length) continue;
    const style = CURVE_STYLES[key];

    const pts = [];
    const radii = [];

    // Anchor dot at snapshot date (at the spot price on that date)
    // This visually ties the forward curve back to the historical section
    if (key !== 'today' && snap.date) {
      const anchorPrice = getSpotAtDate(spotHistory, snap.date);
      if (anchorPrice !== null) {
        pts.push({ x: new Date(snap.date + 'T12:00:00'), y: anchorPrice });
        radii.push(5);
      }
    }

    snap.data.forEach(d => {
      pts.push({ x: new Date(d.delivery + '-01T12:00:00'), y: d.price });
      radii.push(0);
    });

    datasets.push({
      label: CURVE_LABELS[key],
      _curveKey: key,                       // tag for the live-curve overlay lookup
      data: pts,
      borderColor: style.color,
      borderWidth: style.width,
      borderDash: style.dash,
      pointRadius: radii,
      pointBackgroundColor: style.color,
      tension: 0.15,
      spanGaps: false,
      ...(key !== 'today' && {
        segment: {
          borderDash: ctx => ctx.p0DataIndex === 0 ? [5, 4] : undefined,
        },
      }),
    });
  }

  return datasets;
}

// ── Quarter-aligned x-axis bounds ─────────────────────────────────────────────
function quarterFloor(d) {
  const m = Math.floor(d.getMonth() / 3) * 3;
  return new Date(d.getFullYear(), m, 1);
}

const _18moAgo = new Date(TODAY);
_18moAgo.setMonth(_18moAgo.getMonth() - 18);
const X_MIN = quarterFloor(_18moAgo);
const X_MAX = new Date(TODAY);
X_MAX.setMonth(X_MAX.getMonth() + 37);

// ── Create chart ──────────────────────────────────────────────────────────────
function createChart(canvasId, datasets, fmtPrice, { yMax = null } = {}) {
  const yScale = {
    min:    0,
    grid:   { color: 'rgba(254,252,250,0.06)', tickLength: 0 },
    ticks:  { color: 'rgba(254,252,250,0.45)', font: { family: 'Roboto', size: 23 }, callback: v => fmtPrice(v) },
    border: { display: false },
  };
  if (yMax !== null) yScale.max = yMax;

  return new Chart(document.getElementById(canvasId).getContext('2d'), {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(38,36,35,0.92)',
          borderColor: 'rgba(254,252,250,0.15)',
          borderWidth: 1,
          titleColor: '#FEFCFA',
          bodyColor: 'rgba(254,252,250,0.75)',
          titleFont: { family: 'Roboto Slab', size: 23 },
          bodyFont: { family: 'Roboto', size: 23 },
          padding: 12,
          callbacks: {
            title: items => {
              const d = new Date(items[0].parsed.x);
              return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
            },
            label: ctx => ` ${ctx.dataset.label}: ${fmtPrice(ctx.parsed.y)}`,
          },
        },
      },
      scales: {
        x: {
          type: 'time',
          min: X_MIN,
          max: X_MAX,
          time: {
            unit: 'month',
            stepSize: 3,
            displayFormats: { month: "MMM ''yy" },
          },
          grid: {
            tickLength: 0,
            color: ctx => new Date(ctx.tick.value).getMonth() === 0
              ? 'rgba(254,252,250,0.18)'
              : 'rgba(254,252,250,0.06)',
            lineWidth: ctx => new Date(ctx.tick.value).getMonth() === 0 ? 1.5 : 0.75,
          },
          ticks:  {
            color: 'rgba(254,252,250,0.45)',
            font: { family: 'Roboto', size: 23 },
            maxRotation: 0,
            padding: 12,
            callback: value => new Date(value).getUTCMonth() === 0 ? String(new Date(value).getUTCFullYear()) : '',
          },
          border: { display: false },
        },
        y: yScale,
      },
    },
  });
}

// ── Live price ticker + amber dot ─────────────────────────────────────────────
const LIVE_COLOR = '#D1A45A';   // warm gold
const DOT_RING   = '#262423';   // background brown — rings the dot off busy lines
let wtiChart = null, hhChart = null;
let wtiSpark = null, hhSpark = null;

// Intraday sparkline fill/line colors (reuse the up/down palette)
const SPARK_UP_FILL = 'rgba(91,191,106,0.30)', SPARK_DN_FILL = 'rgba(224,104,91,0.34)';
const SPARK_UP_LINE = 'rgba(91,191,106,0.95)', SPARK_DN_LINE = 'rgba(224,104,91,0.95)';

// Draw (or redraw) the intraday area thumbnail inside a ticker box: shaded green
// above yesterday's close, red below, with a dashed reference line at prev_close.
function renderSpark(key, series, prevClose) {
  const wrap = document.getElementById(`${key}-spark-wrap`);
  const old  = key === 'wti' ? wtiSpark : hhSpark;
  if (old) { old.destroy(); }
  if (key === 'wti') wtiSpark = null; else hhSpark = null;

  if (!series || series.length < 2 || prevClose == null) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = '';

  const labels = series.map((_, i) => i);
  const lo  = Math.min(prevClose, ...series);
  const hi  = Math.max(prevClose, ...series);
  const pad = (hi - lo) * 0.18 || Math.abs(prevClose) * 0.01 || 0.01;

  const chart = new Chart(document.getElementById(`${key}-spark`).getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { // intraday price, filled green/red toward yesterday's close
          data: series, borderWidth: 1.6, pointRadius: 0, tension: 0.25,
          fill: { target: { value: prevClose }, above: SPARK_UP_FILL, below: SPARK_DN_FILL },
          segment: {
            borderColor: c =>
              (c.p0.parsed.y + c.p1.parsed.y) / 2 >= prevClose ? SPARK_UP_LINE : SPARK_DN_LINE,
          },
        },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      layout: { padding: 0 },
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: { x: { display: false }, y: { display: false, min: lo - pad, max: hi + pad } },
      elements: { line: { borderJoinStyle: 'round', borderCapStyle: 'round' } },
    },
  });
  if (key === 'wti') wtiSpark = chart; else hhSpark = chart;
}

// Per-commodity display formatting for the live quote
const LIVE_FMT = {
  wti: { price: p => `$${p.toFixed(2)}`, dec: 2 },
  hh:  { price: p => `$${p.toFixed(3)}`, dec: 3 },
};

function liveDotDataset() {
  return {
    label: 'Live',
    data: [],
    borderColor: LIVE_COLOR,
    backgroundColor: LIVE_COLOR,
    pointBackgroundColor: LIVE_COLOR,
    pointBorderColor: DOT_RING,   // brown ring separates the dot from underlying lines
    pointBorderWidth: 2,
    pointRadius: 7,
    pointHoverRadius: 8,
    showLine: false,
    order: -1,            // negative → drawn last → sits on top of every curve
  };
}

function updateDot(chart, price) {
  if (!chart) return;
  const ds = chart.data.datasets.find(d => d.label === 'Live');
  if (!ds) return;
  ds.data = (price == null) ? [] : [{ x: TODAY, y: price }];
  chart.update('none');
}

function updateTicker(key, q) {
  const box      = document.getElementById(`${key}-ticker`);
  const priceEl  = document.getElementById(`${key}-price`);
  const changeEl = document.getElementById(`${key}-change`);
  const asofEl   = document.getElementById(`${key}-asof`);
  const fmt = LIVE_FMT[key];

  if (!q) {
    box.classList.add('empty'); changeEl.textContent = ''; asofEl.textContent = '';
    renderSpark(key, null, null);
    return;
  }

  box.classList.remove('empty');
  priceEl.textContent = fmt.price(q.price);

  // End the intraday line on the current headline price so they agree visually.
  const spark = (q.spark || []).slice();
  if (q.price != null) spark.push(q.price);
  renderSpark(key, spark, q.prev_close);

  const dir   = q.change > 0 ? 'up' : q.change < 0 ? 'down' : 'flat';
  const arrow = q.change > 0 ? '▲' : q.change < 0 ? '▼' : '▬';
  changeEl.className = `ticker-change ${dir}`;
  changeEl.textContent =
    `${arrow} ${Math.abs(q.change).toFixed(fmt.dec)} (${Math.abs(q.pct).toFixed(2)}%)`;

  const t = parseStamp(q.market_time);
  asofEl.textContent = 'as of ' +
    t.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' ' +
    t.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function applyLive(live) {
  updateTicker('wti', live.wti);
  updateTicker('hh',  live.hh);
  updateDot(wtiChart, live.wti ? live.wti.price : null);
  updateDot(hhChart,  live.hh  ? live.hh.price  : null);
}

// Overlay the live intraday forward curve onto the ivory "today" line. Replaces
// just that dataset's points (keeps its styling) and re-labels the strip date, so
// during the trading day the curve and "Today (date)" track live — while the daily
// settled snapshot stays the historical reference for the older comparison curves.
function overlayCurve(chart, c) {
  if (!chart || !c?.data?.length) return;
  const ds = chart.data.datasets.find(d => d._curveKey === 'today');
  if (!ds) return;
  ds.data = c.data.map(d => ({ x: new Date(d.delivery + '-01T12:00:00'), y: d.price }));
  ds.pointRadius = 0;
  ds.label = CURVE_LABELS.today;          // keep tooltip label in sync with the date
  chart.update('none');
}

function applyLiveCurve(curve) {
  if (!curve) return;
  // Don't let a stale live_curve.json regress the chart behind the settled snapshot.
  const cDate = curve.wti?.date || curve.hh?.date;
  if (!cDate || (stripSettledDate && cDate < stripSettledDate)) return;
  applyStripDate(cDate);                  // relabel first so overlayCurve picks up the new label
  applyPrevDayLabel(cDate, strip1dDate);  // "Yesterday" vs weekday is relative to the live today
  [wtiChart, hhChart].forEach(ch => {
    const ds = ch?.data.datasets.find(d => d._curveKey === '1d');
    if (ds) ds.label = CURVE_LABELS['1d'];
  });
  overlayCurve(wtiChart, curve.wti);
  overlayCurve(hhChart,  curve.hh);
  // The displayed curve is now the live pull, so reflect that in "Futures last updated".
  if (curve.generated_at) {
    const el = document.getElementById('updated-time');
    if (el) el.textContent = fmtStamp(parseStamp(curve.generated_at));
  }
}

async function loadLive() {
  try {
    const r = await fetch('live.json?' + Date.now());
    if (r.ok) applyLive(await r.json());
  } catch (_) { /* keep last shown values on a hiccup */ }
  try {
    const rc = await fetch('live_curve.json?' + Date.now());
    if (rc.ok) applyLiveCurve(await rc.json());
  } catch (_) { /* no live curve yet — settled snapshot stays */ }
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const resp = await fetch('energy_data.json?' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    document.getElementById('updated-time').textContent = fmtStamp(parseStamp(data.generated_at));

    // Label the "today" curve / title / legend with the real snapshot date so they
    // stay consistent with "Futures last updated" (not the browser's calendar day).
    stripSettledDate = data.wti?.curves?.today?.date || data.hh?.curves?.today?.date || null;
    strip1dDate      = data.wti?.curves?.['1d']?.date || data.hh?.curves?.['1d']?.date || null;
    applyStripDate(stripSettledDate);
    applyPrevDayLabel(stripSettledDate, strip1dDate);

    const wtiData = [liveDotDataset(), ...buildDatasets(data.wti)];
    const hhData  = [liveDotDataset(), ...buildDatasets(data.hh)];
    wtiChart = createChart('wti-chart', wtiData, v => `$${Math.round(v)}`);
    hhChart  = createChart('hh-chart',  hhData,  v => `$${v.toFixed(2)}`, { yMax: 8 });

    document.getElementById('status').style.display = 'none';

    // Live front-month prices: load now, then poll periodically (independent of
    // the hourly full reload). The live.yml Action refreshes live.json server-side.
    loadLive();
    setInterval(loadLive, 2 * 60 * 1000);   // poll every 2 min (server refreshes ~every 5 min)

  } catch (err) {
    const el = document.getElementById('status');
    el.innerHTML =
      `Could not load <code>energy_data.json</code>.<br><br>` +
      `Run <code>update_data.py</code> first, then refresh this page.<br><br>` +
      `<small style="opacity:.6">${err.message}</small>`;
  }
}

// ── Live clock (top-right) ────────────────────────────────────────────────────
function tickClock() {
  const now = new Date();
  const day  = document.getElementById('clock-day');
  const ymd  = document.getElementById('clock-ymd');
  const time = document.getElementById('clock-time');
  if (day)  day.textContent  = now.toLocaleDateString('en-US', { weekday: 'long' });
  if (ymd)  ymd.textContent  = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  if (time) time.textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
tickClock();
setInterval(tickClock, 1000);

setTimeout(() => location.reload(), 60 * 60 * 1000);

init();
</script>
