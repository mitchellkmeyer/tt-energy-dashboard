name: Update live prices

on:
  schedule:
    # ~Every 15 min, 13:00–22:59 UTC on weekdays (≈8am–6pm Central) — through the
    # trading day. Minutes are offset (3/18/33/48, not :00/:15/:30/:45) because
    # GitHub heavily deprioritizes and often DROPS scheduled runs at the top-of-hour
    # marks; off-peak minutes fire far more reliably. Schedules are still best-effort,
    # so effective cadence is looser than 15 min and occasional gaps are normal.
    - cron: '3,18,33,48 13-22 * * 1-5'
  workflow_dispatch:        # manual run from the Actions tab

permissions:
  contents: write

# Never let two live runs push at once (they'd race on the same file).
concurrency:
  group: live-prices
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests tzdata

      - name: Fetch live front-month prices
        run: python update_live.py

      - name: Commit live data (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live.json live_curve.json
          if git diff --staged --quiet; then
            echo "No live price change."
            exit 0
          fi
          git commit -m "Live prices $(date -u +%H:%M) UTC"
          # The scheduled cron and the external 5-min cron can fire overlapping live
          # runs that BOTH rewrite live.json / live_curve.json. A plain rebase then
          # hits a content conflict and dies in detached-HEAD. These files are fully
          # regenerated each run, so on conflict just keep OUR fresh values (in a
          # rebase the commit being replayed is "theirs"), and retry to ride out the
          # race where another run pushes between our rebase and push.
          for i in 1 2 3 4 5; do
            if git pull --rebase -X theirs origin main && git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "attempt $i lost a push race — retrying"
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 4 + 2))
          done
          echo "still failing after 5 attempts"
          exit 1
