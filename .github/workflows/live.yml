name: Update live prices

on:
  schedule:
    # Every ~15 min, 13:00–22:59 UTC on weekdays (≈8am–6pm Central) — through the
    # trading day. GitHub schedules are best-effort, so effective cadence is looser.
    - cron: '*/15 13-22 * * 1-5'
  workflow_dispatch:        # manual run from the Actions tab

permissions:
  contents: write

# Never let two live runs push at once (they'd race on the same file).
concurrency:
  group: live-prices
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests tzdata

      - name: Fetch live front-month prices
        run: python update_live.py

      - name: Commit live.json (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live.json
          if git diff --staged --quiet; then
            echo "No live price change."
          else
            git commit -m "Live prices $(date -u +%H:%M) UTC"
            git pull --rebase --autostash origin main || true
            git push
          fi
