name: Update live prices

on:
  schedule:
    # ~Every 15 min, 13:00–22:59 UTC on weekdays (≈8am–6pm Central) — through the
    # trading day. Minutes are offset (3/18/33/48, not :00/:15/:30/:45) because
    # GitHub heavily deprioritizes and often DROPS scheduled runs at the top-of-hour
    # marks; off-peak minutes fire far more reliably. Schedules are still best-effort,
    # so effective cadence is looser than 15 min and occasional gaps are normal.
    - cron: '3,18,33,48 13-22 * * 1-5'
  workflow_dispatch:        # manual run from the Actions tab

permissions:
  contents: write

# Never let two live runs push at once (they'd race on the same file).
concurrency:
  group: live-prices
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests tzdata

      - name: Fetch live front-month prices
        env:
          # Optional real-time sources, in priority order. When OILPRICE_API_KEY is
          # set, the ticker pulls fresher OilPriceAPI prices instead of delayed Yahoo.
          # OANDA is a secondary option. Absent/empty -> automatic Yahoo fallback.
          OILPRICE_API_KEY: ${{ secrets.OILPRICE_API_KEY }}
          OANDA_TOKEN:      ${{ secrets.OANDA_TOKEN }}
          OANDA_ACCOUNT:    ${{ secrets.OANDA_ACCOUNT }}
        run: python update_live.py

      - name: Commit live data (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live.json live_curve.json
          if git diff --staged --quiet; then
            echo "No live price change."
          else
            git commit -m "Live prices $(date -u +%H:%M) UTC"
            git pull --rebase --autostash origin main || true
            git push
          fi
